# ============================================================
#  application.properties
#  Đổi DB_NAME, DB_USERNAME, DB_PASSWORD cho đúng máy bạn
# ============================================================

# Server
server.port=8080

# ── Database ──────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/todo_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── JWT ───────────────────────────────────────────────────
# Đổi secret thành chuỗi bất kỳ dài >= 32 ký tự
app.jwt.secret=MySuperSecretKeyForTodoApp_ChangeThis_2024!
app.jwt.expiration-ms=86400000
